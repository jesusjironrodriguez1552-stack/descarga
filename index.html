<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NETFLIX App — Descarga</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E50914;
    --dark: #0a0a0a;
    --card: #141414;
    --text: #ffffff;
    --muted: #808080;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    z-index: 1;
  }

  /* Red glow behind */
  .hero::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(229,9,20,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 15vw, 10rem);
    letter-spacing: 0.05em;
    color: var(--red);
    line-height: 1;
    animation: fadeDown 0.8s ease both;
    text-shadow: 0 0 80px rgba(229,9,20,0.4);
  }

  .tagline {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    animation: fadeDown 0.8s 0.15s ease both;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: var(--red);
    margin: 2.5rem auto;
    animation: fadeDown 0.8s 0.25s ease both;
  }

  .features {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.8s 0.35s ease both;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .feature span {
    color: var(--red);
    font-size: 1rem;
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--red);
    color: white;
    text-decoration: none;
    padding: 1.1rem 2.5rem;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeDown 0.8s 0.45s ease both;
    box-shadow: 0 8px 40px rgba(229,9,20,0.4);
  }

  .download-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  .download-btn:hover::before { transform: translateX(0); }
  .download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 50px rgba(229,9,20,0.55);
  }
  .download-btn:active { transform: translateY(0); }

  .btn-icon {
    width: 22px;
    height: 22px;
    fill: white;
  }

  .version {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    animation: fadeDown 0.8s 0.55s ease both;
  }

  .screenshots {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem;
    text-align: center;
  }

  .screenshots h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 3rem;
  }

  .phones {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .phone {
    width: 160px;
    height: 290px;
    background: var(--card);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: transform 0.3s;
  }

  .phone:hover { transform: translateY(-8px); }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .features { gap: 1rem; }
    .download-btn { padding: 1rem 2rem; font-size: 0.9rem; }
    .phones { gap: 1rem; }
    .phone { width: 130px; height: 240px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="logo">NETFLIX</div>
  <div class="tagline">Tu entretenimiento, en tu bolsillo</div>
  <div class="divider"></div>

  <div class="features">
    <div class="feature"><span>▶</span> Películas y Series</div>
    <div class="feature"><span>🌎</span> Español Latino</div>
    <div class="feature"><span>📱</span> Solo Android</div>
    <div class="feature"><span>⚡</span> Gratis</div>
  </div>

  <a href="netflix.apk" class="download-btn" download>
    <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 16l-6-6h4V4h4v6h4l-6 6zm-7 2h14v2H5v-2z"/>
    </svg>
    Descargar APK
  </a>

  <div class="version">Android 5.0+ · v1.0.0 · ~43 MB</div>
</section>

<section class="screenshots">
  <h2>Capturas</h2>
  <div class="phones">
    <div class="phone">Pantalla<br>Principal</div>
    <div class="phone">Catálogo<br>Películas</div>
    <div class="phone">Reproductor<br>Video</div>
    <div class="phone">Series &<br>Episodios</div>
  </div>
</section>

<footer>
  © 2026 NETFLIX App · Solo para uso personal
</footer>

</body>
</html>
