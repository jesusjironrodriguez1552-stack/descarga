<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<meta name="referrer" content="origin">
<title>Reproductor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
#frame { width: 100%; height: 100%; border: none; display: block; }
#loading {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 10;
}
.spinner { width: 48px; height: 48px; border: 4px solid rgba(229,9,20,0.3); border-top-color: #E50914; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#titulo { color: #fff; font-size: 18px; font-weight: bold; font-family: Arial; }
#fuente { color: #808080; font-size: 13px; font-family: Arial; }
#back {
  position: fixed; top: 16px; left: 16px; z-index: 20;
  background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
  width: 44px; height: 44px; color: #fff; font-size: 20px;
  cursor: pointer; font-family: Arial;
}
#source-badge {
  position: fixed; top: 16px; right: 16px; z-index: 20;
  background: rgba(0,0,0,0.5); padding: 4px 12px;
  border-radius: 12px; font-size: 12px; color: rgba(255,255,255,0.5);
  font-family: Arial;
}
</style>
</head>
<body>
<button id="back" onclick="history.back()">&#8592;</button>
<div id="source-badge" id="source-badge"></div>
<div id="loading">
  <div class="spinner"></div>
  <div id="titulo">Cargando...</div>
  <div id="fuente">Preparando reproduccion...</div>
</div>
<iframe id="frame" allowfullscreen="true" webkitallowfullscreen="true"
  allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
  referrerpolicy="origin"
  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation allow-autoplay">
</iframe>

<script>
var params = {};
var parts = window.location.search.substring(1).split('&');
for (var i = 0; i < parts.length; i++) {
  var kv = parts[i].split('=');
  if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
}

var tmdbId   = params.tmdb || '';
var tipo     = params.tipo || 'movie';
var temporada = params.s || '1';
var episodio  = params.e || '1';
var titulo   = params.titulo || 'Reproduciendo...';
var archiveUrl = params.url || '';

document.getElementById('titulo').textContent = titulo;
document.title = titulo;

var providers = [];
if (archiveUrl) {
  providers = [{ url: archiveUrl, label: 'Servidor propio' }];
} else if (tipo === 'tv') {
  providers = [
    { url: 'https://player.videasy.net/tv/'+tmdbId+'/'+temporada+'/'+episodio+'?color=E50914&nextEpisode=true&autoplayNextEpisode=true', label: 'Videasy' },
    { url: 'https://embed.su/embed/tv/'+tmdbId+'/'+temporada+'/'+episodio, label: 'EmbedSU' },
    { url: 'https://vidsrc.me/embed/tv?tmdb='+tmdbId+'&season='+temporada+'&episode='+episodio, label: 'VidSrc' },
    { url: 'https://multiembed.mov/directstream.php?video_id='+tmdbId+'&tmdb=1&s='+temporada+'&e='+episodio, label: 'MultiEmbed' }
  ];
} else {
  providers = [
    { url: 'https://player.videasy.net/movie/'+tmdbId+'?color=E50914', label: 'Videasy' },
    { url: 'https://embed.su/embed/movie/'+tmdbId, label: 'EmbedSU' },
    { url: 'https://vidsrc.me/embed/movie?tmdb='+tmdbId, label: 'VidSrc' },
    { url: 'https://multiembed.mov/directstream.php?video_id='+tmdbId+'&tmdb=1', label: 'MultiEmbed' }
  ];
}

var current = 0;
var timer = null;
var frame = document.getElementById('frame');
var loading = document.getElementById('loading');
var badge = document.getElementById('source-badge');

function load(index) {
  if (index >= providers.length) {
    loading.style.display = 'flex';
    document.getElementById('titulo').textContent = 'No se pudo cargar el video';
    document.getElementById('fuente').innerHTML = '<button onclick="history.back()" style="background:#E50914;color:#fff;border:none;padding:10px 20px;font-size:14px;border-radius:4px;cursor:pointer;margin-top:8px">Volver</button>';
    return;
  }
  var p = providers[index];
  badge.textContent = p.label;
  document.getElementById('fuente').textContent = 'Cargando ' + p.label + '...';
  loading.style.display = 'flex';
  frame.style.display = 'none';

  if (timer) clearTimeout(timer);

  frame.onload = function() {
    loading.style.display = 'none';
    frame.style.display = 'block';
  };

  frame.src = p.url;

  timer = setTimeout(function() {
    loading.style.display = 'none';
    frame.style.display = 'block';
  }, 10000);
}

load(0);

// Botones para cambiar proveedor manualmente
document.addEventListener('keydown', function(e) {
  if (e.keyCode === 39) { current++; load(current); } // flecha derecha = siguiente
});
</script>
</body>
</html>
