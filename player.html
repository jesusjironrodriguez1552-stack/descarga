<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<meta name="referrer" content="origin">
<title>Reproductor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: Arial; color: #fff; }
#loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; gap: 20px; text-align: center; padding: 20px;
}
.spinner { width: 52px; height: 52px; border: 4px solid rgba(229,9,20,0.3); border-top-color: #E50914; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#titulo { font-size: 20px; font-weight: bold; }
#fuente { font-size: 14px; color: #808080; }
.btn { padding: 14px 32px; background: #E50914; color: #fff; border: none; border-radius: 4px; font-size: 16px; font-family: Arial; font-weight: bold; cursor: pointer; margin: 4px; }
.btn-gray { background: #333; }
#btns { display: none; flex-direction: column; gap: 10px; align-items: center; }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner" id="spinner"></div>
  <div id="titulo">Cargando...</div>
  <div id="fuente">Redirigiendo al video...</div>
  <div id="btns">
    <button class="btn" id="btn-open">&#9654; Abrir Video</button>
    <button class="btn btn-gray" id="btn-next">Probar otro servidor</button>
    <button class="btn btn-gray" onclick="history.back()">&#8592; Volver</button>
  </div>
</div>

<script>
var params = {};
var parts = window.location.search.substring(1).split('&');
for (var i = 0; i < parts.length; i++) {
  var kv = parts[i].split('=');
  if (kv.length >= 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('='));
}

var tmdbId    = params.tmdb   || '';
var tipo      = params.tipo   || 'movie';
var temporada = params.s      || '1';
var episodio  = params.e      || '1';
var titulo    = params.titulo || 'Reproduciendo...';
var archiveUrl = params.url   || '';

document.getElementById('titulo').textContent = titulo;
document.title = titulo;

var providers = [];
if (archiveUrl) {
  providers = [{ url: archiveUrl, label: 'Servidor propio' }];
} else if (tipo === 'tv') {
  providers = [
    { url: 'https://player.videasy.net/tv/'+tmdbId+'/'+temporada+'/'+episodio+'?color=E50914&nextEpisode=true&autoplayNextEpisode=true', label: 'Videasy' },
    { url: 'https://embed.su/embed/tv/'+tmdbId+'/'+temporada+'/'+episodio, label: 'EmbedSU' },
    { url: 'https://vidsrc.me/embed/tv?tmdb='+tmdbId+'&season='+temporada+'&episode='+episodio, label: 'VidSrc' },
    { url: 'https://multiembed.mov/directstream.php?video_id='+tmdbId+'&tmdb=1&s='+temporada+'&e='+episodio, label: 'MultiEmbed' }
  ];
} else {
  providers = [
    { url: 'https://player.videasy.net/movie/'+tmdbId+'?color=E50914', label: 'Videasy' },
    { url: 'https://embed.su/embed/movie/'+tmdbId, label: 'EmbedSU' },
    { url: 'https://vidsrc.me/embed/movie?tmdb='+tmdbId, label: 'VidSrc' },
    { url: 'https://multiembed.mov/directstream.php?video_id='+tmdbId+'&tmdb=1', label: 'MultiEmbed' }
  ];
}

var current = 0;

function loadProvider(index) {
  if (index >= providers.length) { index = 0; }
  current = index;
  var p = providers[index];
  document.getElementById('fuente').textContent = p.label;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btns').style.display = 'none';

  // Redirigir directamente — sin iframe
  setTimeout(function() {
    window.location.href = p.url;
  }, 800);
}

document.getElementById('btn-next').onclick = function() {
  loadProvider(current + 1);
};

document.getElementById('btn-open').onclick = function() {
  window.location.href = providers[current].url;
};

document.addEventListener('keydown', function(e) {
  if (e.keyCode === 39) { loadProvider(current + 1); }
  if (e.keyCode === 8 || e.keyCode === 27) { history.back(); }
});

// Iniciar
loadProvider(0);
</script>
</body>
</html>
